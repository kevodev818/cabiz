# File: .github/workflows/azure-deploy.yml
# Builds the Vite frontend + Node backend, then deploys to Azure App Service

name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger from GitHub UI

env:
  AZURE_WEBAPP_NAME: cabiz    # ← CHANGE THIS to your Azure Web App name
  NODE_VERSION: '20.x'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build

      - name: Create deployment package
        run: |
          # Remove dev-only files from the deploy package
          mkdir -p deploy
          
          # Copy built frontend
          cp -r dist deploy/dist
          
          # Copy server files
          cp -r server deploy/server
          
          # Copy package files
          cp package.json deploy/
          cp package-lock.json deploy/
          
          # Copy env example (actual .env is set via Azure App Settings)
          cp .env.example deploy/.env.example
          
          # Create data directory
          mkdir -p deploy/data

      - name: Install production dependencies in deploy folder
        working-directory: deploy
        run: npm ci --omit=dev

      - name: Zip deployment package
        run: |
          cd deploy
          zip -r ../deploy.zip . -x "*.git*"
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: deploy.zip

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ steps.deploy-to-azure.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package

      - name: Deploy to Azure Web App
        id: deploy-to-azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip

      - name: Deployment summary
        run: |
          echo "### ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "**App URL:** ${{ steps.deploy-to-azure.outputs.webapp-url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u)" >> $GITHUB_STEP_SUMMARY
